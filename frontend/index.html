<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>FitnesSync | Tu entrenamiento, tu progreso</title>

    <base href="/" />

    <!-- ── Forzar Modo Oscuro y Color Base ── -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#121212" />

    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="shortcut icon" type="image/png" href="/assets/logo.png" />

    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800;900&display=swap"

    />

  <body
